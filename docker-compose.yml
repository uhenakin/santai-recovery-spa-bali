version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: santai_db
    restart: unless-stopped
    env_file: backend/.env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE}
      MYSQL_USER:          ${MYSQL_USER}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
      TZ: Asia/Makassar
    command: --default-time-zone=+08:00
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/setup.sql:/docker-entrypoint-initdb.d/setup.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: santai_phpmyadmin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PMA_HOST:     db
      PMA_PORT:     3306
      PMA_USER:     root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: Asia/Makassar
    ports:
      - "8080:80"

  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    container_name: santai_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: backend/.env
    environment:
      TZ: Asia/Makassar
    ports:
      - "5002:5000"

  frontend:
    image: nginx:alpine
    container_name: santai_frontend
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      TZ: Asia/Makassar
    ports:
      - "80:80"

volumes:
  db_data:
