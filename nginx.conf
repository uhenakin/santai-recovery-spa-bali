server {
    listen 80;
    server_name localhost;

    # ── Serve static files (HTML, CSS, JS, images) ───────────
    root  /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy /track dan /dashboard ke Flask backend ─────────
    # Ini artinya tracker.js bisa pakai URL relatif "/track"
    location ~ ^/(track|dashboard|ips|health) {
        proxy_pass         http://backend:5000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Content-Type      $content_type;

        # CORS headers untuk request dari browser
        add_header Access-Control-Allow-Origin  *;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, X-API-Secret";

        if ($request_method = OPTIONS) {
            return 204;
        }
    }
}
